<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosmar - Nueva Incidencia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar {
            background: #1F3864; color: white;
            padding: 14px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar h1 { font-size: 18px; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .container { padding: 24px; max-width: 600px; margin: 0 auto; }
        h2 { color: #1F3864; margin-bottom: 20px; }
        .card {
            background: white; border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08); padding: 28px;
        }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 14px; color: #333; margin-bottom: 6px; font-weight: bold; }
        input, select, textarea {
            width: 100%; padding: 10px 12px;
            border: 1px solid #ddd; border-radius: 6px;
            font-size: 14px; outline: none; font-family: Arial, sans-serif;
        }
        input:focus, select:focus, textarea:focus { border-color: #2E75B6; }
        textarea { resize: vertical; min-height: 100px; }
        .btn-group { display: flex; gap: 10px; margin-top: 8px; }
        .btn {
            padding: 10px 20px; border-radius: 6px; border: none;
            cursor: pointer; font-size: 14px; text-decoration: none;
            display: inline-block; text-align: center;
        }
        .btn-primary { background: #1F3864; color: white; }
        .btn-primary:hover { background: #2E75B6; }
        .btn-secondary { background: #eee; color: #333; }
        .btn-secondary:hover { background: #ddd; }
        .required { color: #c00; }
    </style>
</head>
<body>
<div class="navbar">
    <h1>Rosmar — Incidencias Sanitarias</h1>
    <a th:href="@{/logout}">Cerrar sesión</a>
</div>
<div class="container">
    <h2>Registrar Nueva Incidencia</h2>
    <div class="card">
        <form th:action="@{/incidencias/nueva}" method="post">
            <div class="form-group">
                <label>Título <span class="required">*</span></label>
                <input type="text" name="titulo" placeholder="Resumen breve de la incidencia" required maxlength="150">
            </div>
            <div class="form-group">
                <label>Descripción <span class="required">*</span></label>
                <textarea name="descripcion" placeholder="Describe con detalle lo que observaste..." required minlength="10" maxlength="500"></textarea>
            </div>
            <div class="form-group">
                <label>Área afectada <span class="required">*</span></label>
                <select name="areaId" required>
                    <option value="">-- Selecciona un área --</option>
                    <option th:each="area : ${areas}"
                            th:value="${area.id}"
                            th:text="${area.nombre}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Nivel de severidad <span class="required">*</span></label>
                <select name="severidad" required>
                    <option value="">-- Selecciona severidad --</option>
                    <option th:each="sev : ${severidades}"
                            th:value="${sev.name()}"
                            th:text="${sev.name()}"></option>
                </select>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Guardar incidencia</button>
                <a th:href="@{/incidencias}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
